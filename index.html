<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Videy - Koleksi Viral">
    <title>Videy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
        
        * { font-family: 'Inter', system-ui, sans-serif; }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        .status-bar {
            background: #000;
            color: white;
            font-size: 10px;
            padding: 4px 12px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .video-container {
            position: relative;
            background: #111;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        .player-controls {
            background: #000;
            padding: 8px 12px;
        }
        
        .folder {
            transition: all 0.2s ease;
        }
        
        .folder:hover {
            transform: scale(1.08);
        }
        
        .overlay {
            animation: fadeIn 0.6s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen pb-20">

        <a onclick="goToShopee()" class="flex-1 text-center py-3 font-medium">Upload</a>
        <a onclick="goToShopee()" class="flex-1 text-center py-3 font-medium">Koleksi Viral</a>
    </div>

    <!-- FOLDER SECTION -->
    <div class="px-4 py-4 bg-white text-black">
        <div class="grid grid-cols-4 gap-4 text-center">
            <div onclick="goToShopee()" class="folder flex flex-col items-center">
                <div class="w-14 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-4xl shadow-inner">📁</div>

            <div onclick="goToShopee()" class="folder flex flex-col items-center">
                <div class="w-14 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-4xl shadow-inner">📁</div>
                <p class="text-xs mt-1 font-medium">Indo</p>

            <div onclick="goToShopee()" class="folder flex flex-col items-center">
                <div class="w-14 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-4xl shadow-inner">📁</div>
                <p class="text-xs mt-1 font-medium">China</p>
            </div>
            <div onclick="goToShopee()" class="folder flex flex-col items-center">
                <div class="w-14 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-4xl shadow-inner">📁</div>
                <p class="text-xs mt-1 font-medium">Hijab</p>

    <!-- VIDEO PLAYER -->
    <div class="video-container mx-4 rounded-2xl overflow-hidden border border-gray-800" style="height: 520px;">
        <div class="relative h-full flex items-center justify-center bg-black">
            <video id="mainVideo"

            </video>

            <div id="playOverlay" onclick="this.style.display='none'; document.getElementById('mainVideo').play()" 
                 class="absolute inset-0 flex items-center justify-center bg-black/40 cursor-pointer hidden">
                <div class="w-20 h-20 bg-white/90 rounded-2xl flex items-center justify-center text-5xl text-blue-600 shadow-2xl">
                    ▶
                </div>
            </div>
        </div>

        <!-- PLAYER CONTROLS - TITIK TIGA DIGANTI LOGO WHATSAPP -->
        <div class="player-controls flex items-center justify-between text-white text-xs">

                <span id="time-current">0:00</span>
                <span class="text-gray-400">/</span>
                <span id="time-total">8:05</span>
            </div>
            
            <div class="flex-1 mx-4 h-1 bg-gray-600 rounded-full relative cursor-pointer">

                <div class="absolute left-1/3 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow"></div>
            </div>
            
            <div class="flex items-center gap-4">

                <!-- LOGO WHATSAPP (nutupin titik tiga) -->
                <button onclick="goToWhatsApp()" 
                        class="flex items-center justify-center hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#25D366">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.198.297-.767.966-.94 1.164-.173.198-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.485-.888-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.297-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.48 0 1.463 1.065 2.876 1.213 3.074.149.198 2.095 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.355L.5 21.5l1.5-5.5a9.87 9.87 0 01-1.355-5.031C.645 5.3 5.3.645 10.3.645 15.3.645 20.5 5.3 20.5 10.3c0 4.999-4.7 9.655-9.655 9.655z"/>
                    </svg>
                </button>

    <!-- DOWNLOAD BUTTONS -->
    <div class="px-4 mt-4 flex gap-3">
        <button onclick="goToShopee()" class="flex-1 bg-black border border-gray-700 hover:border-white text-white py-4 rounded-2xl flex flex-col items-center justify-center gap-1 text-sm font-medium">

        <button onclick="goToShopee()" class="flex-1 bg-black border border-gray-700 hover:border-white text-white py-4 rounded-2xl flex flex-col items-center justify-center gap-1 text-sm font-medium">
            <span class="text-xl">⬇️</span>
            Download<br>

        </button>
        <button onclick="goToShopee()" class="flex-1 bg-black border border-gray-700 hover:border-white text-white py-4 rounded-2xl flex flex-col items-center justify-center gap-1 text-sm font-medium">

    <!-- OVERLAY LANJUTKAN -->
    <div id="lanjutkanOverlay" 
         class="overlay fixed inset-0 bg-black/95 z-50 flex items-center justify-center px-6">
        <div class="text-center max-w-xs">
            <div class="mx-auto w-24 h-24 bg-gradient-to-br from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center text-6xl mb-8 shadow-2xl">
                📱

            <h1 class="text-3xl font-bold mb-3">Lanjutkan ke Video</h1>
            <p class="text-gray-400 mb-8 text-lg leading-tight">
                Klik tombol di bawah untuk membuka video full HD
            </p>
            
            <button onclick="lanjutkanKeShopee()" 
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 py-5 rounded-3xl text-xl font-semibold shadow-2xl flex items-center justify-center gap-3">
                <span>LANJUTKAN</span>

        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="fixed bottom-0 left-0 right-0 bg-white text-black border-t flex justify-around py-2 text-xs z-40">
        <div class="flex flex-col items-center text-blue-600">
            <span class="text-2xl">🏠</span>
            <span class="font-medium">Home</span>
        </div>
        <div class="flex flex-col items-center">

        </div>
        <div onclick="goToTelegram()" class="flex flex-col items-center">
            <span class="text-2xl">⋯</span>
            <span class="font-medium text-blue-600">Telegram</span>
        </div>
    </div>

    <script>
        function goToShopee() {
            window.open('https://s.shopee.co.id/168jdcS80', '_blank')
        }
        
        function goToTelegram() {
            window.open('https://t.me/LINK_VIDEY_INDONESIA', '_blank')
        }
        
        // WhatsApp baru
        function goToWhatsApp() {
            window.open('https://whatsapp.com/channel/0029Vb79YJB89ingK2gio01P', '_blank')
        }
        
        function lanjutkanKeShopee() {
            const overlay = document.getElementById('lanjutkanOverlay')
            const video = document.getElementById('mainVideo')
            const playOverlay = document.getElementById('playOverlay')
            
            overlay.style.transition = 'opacity 0.3s ease'
            overlay.style.opacity = '0'
            
            setTimeout(() => {
                overlay.style.display = 'none'
                playOverlay.classList.remove('hidden')
                video.play().catch(() => {})
                
                setTimeout(() => {
                    window.location.href = 'https://s.shopee.co.id/168jdcS80'
                }, 800)
            }, 300)
        }
        
        function updateVideoTime() {
            const video = document.getElementById('mainVideo')
            const currentEl = document.getElementById('time-current')
            
            video.addEventListener('timeupdate', () => {
                const minutes = Math.floor(video.currentTime / 60)
                const seconds = Math.floor(video.currentTime % 60)
                currentEl.textContent = `\( {minutes}: \){seconds < 10 ? '0' : ''}${seconds}`
            })
            
            video.addEventListener('loadedmetadata', () => {
                const totalEl = document.getElementById('time-total')
                const totalMinutes = Math.floor(video.duration / 60)
                const totalSeconds = Math.floor(video.duration % 60)
                totalEl.textContent = `\( {totalMinutes}: \){totalSeconds < 10 ? '0' : ''}${totalSeconds}`
            })
        }
        
        window.onload = function() {
            updateVideoTime()
            const video = document.getElementById('mainVideo')
            video.pause()
            
            console.log('%c✅ Titik tiga sudah ditutup dengan logo WhatsApp!', 'color: #00ff00; font-size: 14px')
        }
    </script>
